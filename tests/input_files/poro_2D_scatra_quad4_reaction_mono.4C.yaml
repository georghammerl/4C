TITLE:
  - "Test 2D scalar transport within porous medium with reaction"
  - "- monolithic"
  - "- standard poro elements (darcy)"
  - "- quad4 elements"
  - "should give same results as corresponding partitioned test"
PROBLEM SIZE:
  DIM: 2
PROBLEM TYPE:
  PROBLEMTYPE: "Poroelastic_scalar_transport"
FLUID DYNAMIC:
  LINEAR_SOLVER: 1
FLUID DYNAMIC/POROUS-FLOW STABILIZATION:
  SUPG: false
  GRAD_DIV: false
  RSTAB: "rstab_gls"
  DEFINITION_TAU: "Franca_Madureira_Valentin_Badia_Codina"
  EVALUATION_TAU: "integration_point"
  EVALUATION_MAT: "integration_point"
POROELASTICITY DYNAMIC:
  SECONDORDER: false
  LINEAR_SOLVER: 2
POROSCATRA CONTROL:
  RESTARTEVERY: 10
  NUMSTEP: 50
  MAXTIME: 4000
  TIMESTEP: 0.01
  TOLRES_GLOBAL: 1e-07
  TOLINC_GLOBAL: 1e-06
  NORM_INC: "AbsGlobal"
  NORM_RESF: "AbsGlobal"
  LINEAR_SOLVER: 1
  COUPALGO: "monolithic"
SOLVER 1:
  SOLVER: "UMFPACK"
SOLVER 2:
  SOLVER: "Belos"
  AZPREC: "Teko"
  AZREUSE: 10
  SOLVER_XML_FILE: "xml/linear_solver/iterative_gmres_template.xml"
  PRECONDITIONER_XML_FILE: "xml/block_preconditioner/porofluid.xml"
  NAME: "Poro_Interaction_Solver"
SOLVER 3:
  SOLVER: "Belos"
  AZTOL: 1e-09
  NAME: "Sca_Tra_Solver"
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "OneStepTheta"
  DAMPING: "Material"
  LINEAR_SOLVER: 1
STRUCTURAL DYNAMIC/ONESTEPTHETA:
  THETA: 0.66
SCALAR TRANSPORT DYNAMIC:
  SOLVERTYPE: "linear_incremental"
  THETA: 0.66
  MATID: 5
  VELOCITYFIELD: "Navier_Stokes"
  INITIALFIELD: "field_by_function"
  INITFUNCNO: 2
  SKIPINITDER: true
  LINEAR_SOLVER: 3
SCALAR TRANSPORT DYNAMIC/STABILIZATION:
  STABTYPE: "no_stabilization"
  EVALUATION_MAT: "integration_point"
CLONING MATERIAL MAP:
  - SRC_FIELD: "structure"
    SRC_MAT: 1
    TAR_FIELD: "porofluid"
    TAR_MAT: 3
  - SRC_FIELD: "structure"
    SRC_MAT: 1
    TAR_FIELD: "scatra"
    TAR_MAT: 5
MATERIALS:
  - MAT: 1
    MAT_StructPoroReaction:
      MATID: 2
      POROLAWID: 10
      INITPOROSITY: 0.3
      DOFIDREACSCALAR: 0
  - MAT: 10
    MAT_PoroLawNeoHooke:
      BULKMODULUS: 20
      PENALTYPARAMETER: 0.001
  - MAT: 2
    MAT_ElastHyper:
      NUMMAT: 1
      MATIDS: [4]
      DENS: 1.1
  - MAT: 4
    ELAST_CoupNeoHooke:
      YOUNG: 20000
      NUE: 0.3
  - MAT: 3
