TITLE: "Two straight rigid fibers pulled apart with the two half pass approach"
PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
beam_potential:
  two_half_pass: true
  type: "volume"
  strategy: "single_length_specific_small_separations_simple"
  potential_law_prefactors: [-1]
  potential_law_exponents: [6.0]
  cutoff_radius: 10.0
  n_integration_segments: 1
  n_gauss_points: 50
  potential_reduction_length: 15.0
  runtime_output:
    interval_steps: 5
    force: true
    moment: true
BINNING STRATEGY:
  BIN_SIZE_LOWER_BOUND: 10.0
  DOMAINBOUNDINGBOX: "-100.0 -10.0 -10.0 100.0 10.0 10.0"
IO:
  STDOUTEVERY: 5
IO/MONITOR STRUCTURE DBC:
  FILE_TYPE: "csv"
  PRECISION_SCREEN: 5
  INTERVAL_STEPS: 1
IO/RUNTIME VTK OUTPUT:
  EVERY_ITERATION: false
  OUTPUT_DATA_FORMAT: "ascii"
  INTERVAL_STEPS: 5
IO/RUNTIME VTK OUTPUT/BEAMS:
  OUTPUT_BEAMS: true
SOLVER 1:
  NAME: "Structure_Solver"
  SOLVER: "UMFPACK"
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "Statics"
  INT_STRATEGY: "Standard"
  LINEAR_SOLVER: 1
  MAXITER: 15
  NLNSOL: "fullnewton"
  NORM_DISP: "Abs"
  NORM_RESF: "Abs"
  NORMCOMBI_RESFDISP: "And"
  PREDICT: "ConstDis"
  TOLDISP: 1e-08
  TOLRES: 1e-06
  RESULTSEVERY: 5
  RESEVERYERGY: 1
  TIMESTEP: 1e-04
  NUMSTEP: 5
  MAXTIME: 0.0005
