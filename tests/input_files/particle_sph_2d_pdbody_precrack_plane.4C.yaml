TITLE:
  - "test PRE_CRACK_PLANES and per-particle Dirichlet BC for bond-based peridynamics"
  - "Small 2D plate (10x10 particles) with a horizontal pre-crack and fixed particles"
  - "Verifies: bonds crossing PRE_CRACK_PLANES are broken at init (damage > 0)"
  - "Verifies: DIRICHLET_FUNCT particles remain at reference position under loading"
  - "see, e.g., particle ID 0 (fixed) and ID 44 (crack-adjacent) in result description"
  - "particle ID 99 is free and moving due to gravity, no damage"
PROBLEM TYPE:
  PROBLEMTYPE: "Particle"
IO:
  STDOUTEVERY: 100
  VERBOSITY: "Standard"
BINNING STRATEGY:
  BIN_SIZE_LOWER_BOUND: 4
  DOMAINBOUNDINGBOX: "-10.0 -10.0 -0.01 15.0 10.0 0.01"
PARTICLE DYNAMIC:
  DYNAMICTYPE: "VelocityVerlet"
  INTERACTION: "SPH"
  RESULTSEVERY: 100
  RESTARTEVERY: 200
  TIMESTEP: 8.0e-6
  NUMSTEP: 500
  MAXTIME: 10
  GRAVITY_ACCELERATION: "9810.0 0.0 0.0"
  PHASE_TO_DYNLOADBALFAC: "pdphase 1.0"
  PHASE_TO_MATERIAL_ID: "pdphase 1"
  RIGID_BODY_MOTION: false
  PD_BODY_INTERACTION: true
PARTICLE DYNAMIC/INITIAL AND BOUNDARY CONDITIONS:
  CONSTRAINT: "Projection2D"
  DIRICHLET_BOUNDARY_CONDITION_FLAGGED: [pdphase]
PARTICLE DYNAMIC/SPH:
  KERNEL: QuinticSpline
  KERNEL_SPACE_DIM: Kernel2D
  INITIALPARTICLESPACING: 1.0
  BOUNDARYPARTICLEFORMULATION: AdamiBoundaryFormulation
  TRANSPORTVELOCITYFORMULATION: StandardTransportVelocity
PARTICLE DYNAMIC/PD:
  INTERACTION_HORIZON: 3.0
  PERIDYNAMIC_GRID_SPACING: 1.0
  PD_DIMENSION: Peridynamic_2DPlaneStrain
  NORMALCONTACTLAW: NormalLinearSpring
  NORMAL_STIFF: 60.0
  PRE_CRACK_PLANES:
    - P0: [-5.0, 0.0, -0.5]
      P1: [0.0, 0.0, -0.5]
      P2: [-5.0, 0.0, 0.5]
MATERIALS:
  - MAT: 1
    MAT_ParticlePD:
      INITRADIUS: 0.5
      INITDENSITY: 8000.0e-9
      YOUNG: 1.0e3
      CRITICAL_STRETCH: 0.015
FUNCT1:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "0.0"
  - COMPONENT: 1
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "0.0"
  - COMPONENT: 2
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "0.0"
RESULT DESCRIPTION:
  - PARTICLE:
      ID: 0
      QUANTITY: "posx"
      VALUE: -4.50000000000000000e+00
      TOLERANCE: 1e-09
